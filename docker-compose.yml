version: "3.8"

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns.db:/mlflow/mlruns.db
    command: >
      mlflow server
        --backend-store-uri sqlite:///mlflow/mlruns.db
        --host 0.0.0.0
        --port 5000
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
      - ./src/artifacts_hetero:/app/src/artifacts_hetero
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: python src/model_api.py
    depends_on:
      - mlflow
    restart: unless-stopped

  train-hetero:
    build: .
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
      - ./src/artifacts_hetero:/app/src/artifacts_hetero
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: python src/quick_retrain.py
    profiles:
      - train

  train-homo:
    build: .
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
      - ./src/artifacts_hetero:/app/src/artifacts_hetero
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: python src/homo_retrain.py
    profiles:
      - train

  compare:
    build: .
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
      - ./src/artifacts_hetero:/app/src/artifacts_hetero
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
    command: python src/compare_models.py
    depends_on:
      - train-hetero
      - train-homo
    profiles:
      - train

version: '3.8'

services:
  # ============================================================================
  # HOMOGENEOUS GNN (Baseline)
  # ============================================================================
  
  # Train homogeneous model
  train-homogeneous:
    build: .
    container_name: gnn-train-homo
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/src
    command: python src/gnn_pipeline.py --zone DK1
    networks:
      - gnn-network
  
  # Homogeneous API
  api-homogeneous:
    build: .
    container_name: gnn-api-homo
    ports:
      - "8000:8000"
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/src
    command: python src/gnn_api.py
    restart: unless-stopped
    networks:
      - gnn-network

  # ============================================================================
  # HETEROGENEOUS GNN (Advanced)
  # ============================================================================
  
  # Train heterogeneous model (with baseline comparison)
  train-heterogeneous:
    build: .
    container_name: gnn-train-hetero
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
      - ./artifacts_hetero:/app/artifacts_hetero
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/src
    command: python src/hetero_pipeline.py --zone DK1 --model SimpleHeteroGNN
    networks:
      - gnn-network
  
  # Train heterogeneous only (skip baseline)
  train-heterogeneous-only:
    build: .
    container_name: gnn-train-hetero-only
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
      - ./artifacts_hetero:/app/artifacts_hetero
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/src
    command: python src/hetero_pipeline.py --zone DK1 --model SimpleHeteroGNN --skip-baseline
    networks:
      - gnn-network

  # ============================================================================
  # COMPARISON
  # ============================================================================
  
  # Compare both models
  compare-models:
    build: .
    container_name: gnn-compare
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
      - ./artifacts_hetero:/app/artifacts_hetero
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/src
    command: python src/compare_models.py
    networks:
      - gnn-network
    depends_on:
      - train-homogeneous
      - train-heterogeneous

  # ============================================================================
  # DASHBOARD
  # ============================================================================
  
  # Dashboard (works with both models)
  dashboard:
    build: .
    container_name: gnn-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
      - ./artifacts_hetero:/app/artifacts_hetero
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/app/src
    command: streamlit run src/gnn_dashboard.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
    networks:
      - gnn-network

networks:
  gnn-network:
    driver: bridge

volumes:
  data:
  artifacts:
  artifacts_hetero: